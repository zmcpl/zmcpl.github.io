<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kasa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap');
    
        body {
            background-image: url(./2023-12-17_00.30.25.png);
            background-position: center;
            background-repeat: no-repeat;
            background-position-y: 0;
            background-size: 180%;
        }

        #header {
            color: white;
            font-family: Noto Sans;
            font-size: 30px;
            text-align: center;
            padding: 10px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }

        #nav {
            width: 100%;
        }

        #nav label {
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        input {
            background-color: rgba(255,255,255,0.5);
            border-radius: 10px;
            color: white;
            width: 14%;
            border: 0px solid white;
            height: 2rem;
            justify-content: center;
            margin-right: 1%;
            font-size: 1rem;
        }

        #main {
            width: 90%;
            height: 550px;
            background-color: rgba(255, 255, 255, 0.76);
            margin: 5%;
            border-radius: 10px;
            padding: 1%;
            display: block;
        }

        #blockone,
        #blocktwo,
        #blocktrzy {
            width: 100%;
            text-align: center;
            padding-top: 1%;
            font-family: Noto Sans;
            color: white;
            font-size: 20px;
        }

        #blockone {
            border-top-right-radius: 10px;
            border-top-left-radius: 10px;
            background-color: rgb(197, 47, 172);
            height: 150px;
        }

        #blocktwo {
            background-color: rgb(197, 47, 47);
            margin-top: 1%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        #blocktrzy {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            background-color: rgb(47, 70, 197);
            margin-top: 1%;
            height: 150px;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        #suma {
            font-size: 40px;
        }

        #footer {
            width: 90%;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.76);
            margin: 5%;
            border-radius: 10px;
            padding: 1%;
            display: block;
            font-size: 3rem;
            font-family: Noto Sans;
            text-align: center;
            font-weight: bolder;
            padding-top: 2.4rem;
        }
    </style>
</head>
<body>
    <div id="header">
        <b>zmcpl.github.io</b> | Project Bot Calc
    </div>
    <div id="nav">
        <label>
            <input type="text" id="numberone" class="zarobki-input">
            <input type="text" id="numbertwo" class="zarobki-input">
            <input type="text" id="numberthree" class="zarobki-input">
            <input type="text" id="numberfour" class="zarobki-input">
            <input type="text" id="numberfive" class="zarobki-input">
            <input type="text" id="numbersix" class="zarobki-input">
        </label>
    </div>

    <div id="main">
        <div id="blockone">
            <span>
                Boty zarobiły łącznie:
                <br>
                <span id="suma"></span> $
                <br>
                GZ
            </span>
        </div>
        <div id="blocktwo">
            <div style="float: left;">
                <label>
                    ilość botow
                    <input type="text" style="width: 100px; text-align: center;" id="botyInput">
                </label>
            </div>
            <div>
                Na bota przypada
                    <br>
                <span id="boty"></span>
            </div>
            
        </div>
        <div id="blocktrzy">
            <div style="float: left;">
                <label>
                    czas w min
                    <input type="text" style="width: 100px; text-align: center;" id="czasInput">
                </label>
            </div>
            <span style="float: left;">
                Bot na minute zarabiał
                <br>
                <span id="przyblizenie"></span> $ 
            </span>
        </div>
    </div>
    <div id="footer">
        Projekt : V2.0 |
    </div>

    <script>
        var zarobkiInputs = document.querySelectorAll('.zarobki-input');
        var sumaDiv = document.getElementById('suma');
        var botyDiv = document.getElementById('boty');
        var przyblizenieDiv = document.getElementById('przyblizenie');
        var czasInput = document.getElementById('czasInput');
        var botyInput = document.getElementById('botyInput');
    
        function sumary() {
            var total = 0;
            zarobkiInputs.forEach(function(input) {
                // Usuń przecinki i kropki, a następnie sparsuj jako float
                total += parseFloat(input.value.replace(/[,\.]/g, '')) || 0;
            });
    
            sumaDiv.innerHTML = total.toLocaleString(); // Formatowanie cyfr z przecinkami
            nabota(total);
            podkladka(total);
        }
    
        function nabota(dodajDivValue) {
            var logitech = dodajDivValue / botyInput.value;
            botyDiv.innerHTML = logitech.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
    
        function podkladka(total) {
            var wynik = total / czasInput.value;
            przyblizenieDiv.innerHTML = wynik.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
    
        zarobkiInputs.forEach(function(input) {
            input.addEventListener('input', sumary);
        });
    
        czasInput.addEventListener('input', sumary);

        botyInput.addEventListener('input', sumary);
        sumary();
    </script>
</body>
</html>
