<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS99 Farm Tracker</title>

<meta property="og:site_name" content="PS99 Farm Tracker">

<meta name="twitter:card" content="summary">

<meta name="twitter:description" content="Śledź zarobki swoich farm w Pet Simulator 99. Codzienne wpisy, wykresy stanów kont i pełna historia — wszystko zapisane lokalnie w przeglądarce.">
<style>
  :root{
    --bg:#0c0f14;
    --panel:#151a22;
    --panel-2:#1b212b;
    --border:#262e3a;
    --border-2:#34404f;
    --text:#e8ecf1;
    --text-dim:#8b96a5;
    --text-faint:#5a6573;
    --accent:#3aa84d;
    --accent-dim:#2d5a33;
    --accent-glow:#3aa84d22;
    --warn:#ffb454;
    --danger:#ff6b6b;
    --radius:10px;
    --font-display:'Chakra Petch',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  html.light{
    --bg:#f0f2f5;
    --panel:#ffffff;
    --panel-2:#f5f7fa;
    --border:#dde1e8;
    --border-2:#c8cdd7;
    --text:#1a1f2e;
    --text-dim:#4a5568;
    --text-faint:#8a95a8;
    --accent:#1e8a36;
    --accent-dim:#c6f0cf;
    --accent-glow:#1e8a3618;
    --warn:#b45309;
    --danger:#dc2626;
  }
  html.light .range-toggle button.active,
  html.light .view-toggle button.active{
    color:#fff;
  }
  html.light tbody td{color:var(--text);}
  html.light .entry-row input{color:var(--text);}
  html.light thead th{color:var(--text-faint);}

  .theme-btn{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    background:none;
    border:1px solid var(--border-2);
    color:var(--text-dim);
    font-size:12.5px;
    font-weight:500;
    padding:9px 12px;
    border-radius:8px;
    cursor:pointer;
    font-family:inherit;
    margin-bottom:6px;
  }
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}
  .theme-icon{font-size:15px;line-height:1;}
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
  }
  ::selection{background:var(--accent-dim);color:var(--accent);}

  .app{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
  }
  @media (max-width:880px){
    .app{grid-template-columns:1fr;}
    .sidebar{border-right:none;border-bottom:1px solid var(--border);}
  }

  /* ===== SIDEBAR ===== */
  .sidebar{
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:20px 16px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:4px 4px 14px;
    border-bottom:1px solid var(--border);
  }
  .brand-mark{
    width:30px;height:30px;
    border-radius:7px;
    background:linear-gradient(155deg,var(--accent) 0%,#3fae57 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:700;
    font-size:14px;
    color:#08220c;
    flex-shrink:0;
  }
  .brand-text{line-height:1.15;}
  .brand-text .t1{
    font-family:var(--font-display);
    font-size:14px;
    font-weight:600;
    letter-spacing:.02em;
  }
  .brand-text .t2{
    font-size:11px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .section-label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--text-faint);
    font-weight:600;
    margin:0 0 8px 2px;
  }

  .account-list{
    display:flex;
    flex-direction:column;
    gap:5px;
  }

  .account-row{
    display:flex;
    align-items:center;
    gap:9px;
    padding:9px 10px;
    border-radius:8px;
    border:1px solid transparent;
    cursor:pointer;
    background:transparent;
    transition:background .12s, border-color .12s;
  }
  .account-row:hover{background:var(--panel-2);}
  .account-row.active{
    background:var(--accent-glow);
    border-color:var(--accent-dim);
  }
  .acc-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--border-2);
    flex-shrink:0;
  }
  .account-row.active .acc-dot{background:var(--accent);}
  .acc-name{
    flex:1;
    font-size:13.5px;
    font-weight:500;
    color:var(--text);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    background:none;
    border:none;
    outline:none;
    font-family:inherit;
    padding:0;
    cursor:pointer;
    min-width:0;
  }
  .account-row.active .acc-name{color:var(--accent);}
  .acc-name:focus{cursor:text;}
  .acc-value{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    flex-shrink:0;
  }
  .account-row.active .acc-value{color:var(--text-dim);}
  .acc-remove{
    display:flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;
    background:var(--panel);
    border:1px solid var(--border-2);
    color:var(--text-dim);
    cursor:pointer;
    font-size:13px;
    line-height:1;
    flex-shrink:0;
    border-radius:5px;
    font-family:var(--font-body);
  }
  .acc-remove:hover{color:#fff;background:var(--danger);border-color:var(--danger);}

  .add-account-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    background:none;
    border:1px dashed var(--border-2);
    color:var(--text-dim);
    font-size:12.5px;
    font-weight:500;
    padding:9px 10px;
    border-radius:8px;
    cursor:pointer;
    font-family:inherit;
    margin-top:5px;
  }
  .add-account-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}

  .entry-card{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
  }
  .entry-card label{
    display:block;
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:8px;
    line-height:1.5;
  }
  .entry-card label .acc-tag{color:var(--accent);font-weight:600;}
  .entry-row{display:flex;gap:8px;}
  .entry-row input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--border-2);
    border-radius:7px;
    padding:9px 10px;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:14px;
    width:0;
    outline:none;
  }
  .entry-row input::placeholder{color:var(--text-faint);}
  .entry-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  .entry-row button{
    background:var(--accent);
    border:none;
    border-radius:7px;
    padding:0 14px;
    font-weight:600;
    font-size:13px;
    color:#08220c;
    cursor:pointer;
    flex-shrink:0;
    font-family:var(--font-body);
  }
  .entry-row button:active{transform:scale(.97);}
  .entry-hint{
    font-size:10.5px;
    color:var(--text-faint);
    margin-top:7px;
  }
  .reset-check{
    display:flex;
    align-items:center;
    gap:7px;
    margin-top:9px;
    cursor:pointer;
    font-size:12px;
    color:var(--text-dim);
    user-select:none;
  }
  .reset-check input[type=checkbox]{
    accent-color:var(--warn);
    width:14px;height:14px;
    cursor:pointer;
    flex-shrink:0;
  }
  .reset-check.active{color:var(--warn);}
  .entry-status{
    font-size:11px;
    margin-top:8px;
    min-height:14px;
    color:var(--accent);
  }

  .sidebar-foot{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .ghost-btn{
    background:none;
    border:1px solid var(--border-2);
    color:var(--text-dim);
    font-size:12px;
    padding:8px 10px;
    border-radius:7px;
    cursor:pointer;
    font-family:inherit;
    text-align:left;
  }
  .ghost-btn:hover{border-color:var(--danger);color:var(--danger);}

  /* ===== MAIN ===== */
  .main{
    padding:22px 28px 40px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
  }
  .topbar h1{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    margin:0 0 4px;
    letter-spacing:.01em;
  }
  .topbar .sub{
    font-size:12.5px;
    color:var(--text-faint);
  }

  .view-toggle{
    display:flex;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:3px;
    gap:2px;
  }
  .view-toggle button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:12px;
    font-weight:500;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .view-toggle button.active{
    background:var(--accent);
    color:#08220c;
    font-weight:600;
  }

  .stat-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:13px 15px;
  }
  .stat .lbl{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.07em;
    color:var(--text-faint);
    margin-bottom:6px;
  }
  .stat .val{
    font-family:var(--font-mono);
    font-size:19px;
    font-weight:600;
  }
  .stat .val.pos{color:var(--accent);}
  .stat .val.neg{color:var(--danger);}

  .chart-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 18px 10px;
  }
  .chart-card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
    gap:10px;
  }
  .chart-card-head h2{
    font-size:13px;
    font-weight:600;
    margin:0;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .metric-toggle{
    display:flex;
    gap:4px;
  }
  .metric-toggle button{
    background:none;
    border:1px solid var(--border-2);
    color:var(--text-dim);
    font-size:11px;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .metric-toggle button.active{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-glow);
  }
  .chart-controls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .range-toggle{
    display:flex;
    gap:2px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:2px;
  }
  .range-toggle button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:11px;
    padding:5px 9px;
    border-radius:5px;
    cursor:pointer;
    font-family:inherit;
  }
  .range-toggle button.active{
    background:var(--accent);
    color:#08220c;
    font-weight:600;
  }
  .chart-wrap{position:relative;width:100%;height:340px;}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-faint);
    font-size:13px;
  }
  .empty-state i{font-size:26px;display:block;margin-bottom:10px;opacity:.5;}

  .history-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .history-card h2{
    font-size:13px;
    font-weight:600;
    margin:0 0 12px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{
    text-align:left;
    color:var(--text-faint);
    font-weight:500;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    padding:0 8px 8px;
    border-bottom:1px solid var(--border);
  }
  tbody td{
    padding:8px 8px;
    border-bottom:1px solid var(--border);
    font-family:var(--font-mono);
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody td.delta.pos{color:var(--accent);}
  tbody td.delta.neg{color:var(--danger);}
  td.del-cell{text-align:right;font-family:var(--font-body);}
  td.del-cell button{
    background:none;border:none;color:var(--text-faint);
    cursor:pointer;font-size:14px;padding:2px 4px;
  }
  td.del-cell button:hover{color:var(--danger);}
  td.editable-value{cursor:pointer;border-radius:5px;}
  td.editable-value:hover{background:var(--panel-2);outline:1px dashed var(--border-2);}
  td.editable-value input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--accent);
    border-radius:5px;
    padding:4px 6px;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:12.5px;
    outline:none;
  }
  .acc-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:500;
  }
  .acc-badge .dot{
    width:7px;height:7px;border-radius:50%;
    flex-shrink:0;
  }

  .toast{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--panel-2);
    border:1px solid var(--border-2);
    color:var(--text);
    padding:9px 16px;
    border-radius:8px;
    font-size:12.5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">PS</div>
      <div class="brand-text">
        <div class="t1">Farm tracker</div>
        <div class="t2">Pet Simulator 99</div>
      </div>
    </div>

    <div>
      <div class="section-label" id="accountsLabel">Konta</div>
      <div class="account-list" id="accountList"></div>
      <button class="add-account-btn" id="addAccountBtn"><i class="ti ti-plus" style="font-size:14px;" aria-hidden="true"></i>Dodaj konto</button>

    <div class="entry-card">
      <label>Zapisz dzisiejszy stan dla <span class="acc-tag" id="entryAccLabel">—</span></label>

    <div class="sidebar-foot">

        <span id="themeLabel">Jasny motyw</span>
      </button>
      <button class="ghost-btn" id="exportBtn"><i class="ti ti-download" style="margin-right:6px;vertical-align:-2px;"></i>Eksportuj dane (JSON)</button>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Stan farm — przegląd</h1>
        <div class="sub" id="subLine">Wybierz konto z listy i zapisz dzisiejszą wartość</div>

    </div>

    <div class="stat-row" id="statRow"></div>

    <div class="chart-card">
      <div class="chart-card-head">
        <h2 id="chartTitle">Stan konta w czasie</h2>
        <div class="chart-controls">
          <div class="range-toggle" id="rangeToggle">
            <button data-range="week">Tydzień</button>
            <button data-range="month">Miesiąc</button>
            <button data-range="year">Rok</button>
            <button data-range="all" class="active">Wszystko</button>
          </div>
        </div>
      </div>
      <div id="chartLegend" style="display:flex;flex-wrap:wrap;gap:10px 16px;margin:2px 0 14px;"></div>
      <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Wykres stanu kont w czasie"></canvas></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="ti ti-chart-line"></i>

    <div class="history-card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;">

        <div class="range-toggle" id="historyFilter">
          <button data-filter="today" class="active">Dziś</button>

      <div id="historyTable"></div>

  </main>

</div>

<div class="toast" id="toast"></div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){

const DB_NAME = 'ps99_farm_tracker';
const DB_VERSION = 2;
const STORE = 'entries';
const ACC_STORE = 'accounts';
let db = null;

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const _db = e.target.result;
      if(!_db.objectStoreNames.contains(STORE)){
        const store = _db.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('account', 'account', { unique: false });
      }
      if(!_db.objectStoreNames.contains(ACC_STORE)){
        _db.createObjectStore(ACC_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function txStore(name, mode){
  const tx = db.transaction(name, mode);
  return tx.objectStore(name);
}

function dbGetAll(name){
  return new Promise((resolve, reject) => {
    const req = txStore(name, 'readonly').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(name, entry){
  return new Promise((resolve, reject) => {
    const req = txStore(name, 'readwrite').put(entry);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(name, id){
  return new Promise((resolve, reject) => {
    const req = txStore(name, 'readwrite').delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(name){
  return new Promise((resolve, reject) => {
    const req = txStore(name, 'readwrite').clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function defaultAccounts(){
  return Array.from({length: 10}, (_, i) => ({ id: 'acc' + (i+1), name: 'Konto ' + (i+1) }));
}
let accounts = [];
let accCounter = 0;

let entries = [];
let activeAccountId = null;
let chartRange = 'all';
let historyFilter = 'today';
let chart = null;

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseShorthand(raw){
  if(!raw) return null;
  let s = raw.trim().toLowerCase().replace(',', '.');
  let mult = 1_000_000;
  if(s.endsWith('q')){ mult = 1_000_000_000_000_000; s = s.slice(0,-1); }
  else if(s.endsWith('t')){ mult = 1_000_000_000_000; s = s.slice(0,-1); }
  else if(s.endsWith('k')){ mult = 1_000_000_000; s = s.slice(0,-1); }
  else if(s.endsWith('m')){ mult = 1_000_000; s = s.slice(0,-1); }
  const num = parseFloat(s);
  if(isNaN(num)) return null;
  return Math.round(num * mult);
}

function formatFull(n){
  if(n === null || n === undefined) return '—';
  return new Intl.NumberFormat('pl-PL').format(Math.round(n));
}

function formatShort(n){
  if(n === null || n === undefined) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if(abs >= 1_000_000_000_000_000) return sign + (abs/1_000_000_000_000_000).toFixed(2) + 'Q';
  if(abs >= 1_000_000_000_000) return sign + (abs/1_000_000_000_000).toFixed(2) + 'T';
  if(abs >= 1_000_000_000) return sign + (abs/1_000_000_000).toFixed(2) + 'B';
  if(abs >= 1_000_000) return sign + (abs/1_000_000).toFixed(2) + 'M';
  if(abs >= 1_000) return sign + (abs/1_000).toFixed(1) + 'k';
  return sign + abs;
}

function entriesForAccount(accId){
  return entries.filter(e => e.account === accId).sort((a,b) => a.date.localeCompare(b.date));
}

function latestValue(accId){
  const list = entriesForAccount(accId);
  return list.length ? list[list.length - 1].value : null;
}

function dailyDeltas(list){
  let offset = 0;
  const result = [];
  for(let i = 0; i < list.length; i++){
    const e = list[i];
    if(e.isReset && i > 0){
      offset = result[i-1].balance; // skumulowany stan tuż przed resetem
    }
    const cumulative = offset + e.value;
    const prevBalance = i === 0 ? null : result[i-1].balance;
    result.push({
      date: e.date,
      balance: cumulative,
      delta: prevBalance === null ? null : cumulative - prevBalance,
      isReset: !!e.isReset,
      rawValue: e.value,
    });
  }
  return result;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function renderAccountList(){
  const wrap = document.getElementById('accountList');
  wrap.innerHTML = '';
  accounts.forEach(acc => {
    const row = document.createElement('div');
    row.className = 'account-row' + (acc.id === activeAccountId ? ' active' : '');
    row.innerHTML = `
      <span class="acc-dot"></span>
      <input class="acc-name" value="${escapeHtml(acc.name)}" spellcheck="false" data-id="${acc.id}">
      <span class="acc-value">${formatShort(latestValue(acc.id))}</span>
      <button class="acc-remove" data-id="${acc.id}" title="Usuń konto" aria-label="Usuń ${escapeHtml(acc.name)}">&times;</button>
    `;
    row.addEventListener('click', (e) => {
      if(e.target.tagName === 'INPUT' || e.target.closest('.acc-remove')) return;
      activeAccountId = acc.id;
      renderAll();
    });
    const nameInput = row.querySelector('.acc-name');
    nameInput.addEventListener('click', (e) => { activeAccountId = acc.id; e.stopPropagation(); });
    nameInput.addEventListener('change', async (e) => {
      const a = accounts.find(x => x.id === acc.id);
      a.name = e.target.value.trim() || a.name;
      await dbPut(ACC_STORE, a);
      renderAll();
    });
    row.querySelector('.acc-remove').addEventListener('click', async (e) => {
      e.stopPropagation();
      await removeAccount(acc.id);
    });
    wrap.appendChild(row);
  });
  const label = document.getElementById('entryAccLabel');
  const active = accounts.find(a => a.id === activeAccountId);
  label.textContent = active ? active.name : '—';
  document.getElementById('accountsLabel').textContent = 'Konta (' + accounts.length + ')';
}

async function removeAccount(id){
  if(accounts.length <= 1){
    showToast('Musi zostać co najmniej jedno konto');
    return;
  }
  const acc = accounts.find(a => a.id === id);
  const hasEntries = entries.some(e => e.account === id);
  const msg = hasEntries
    ? `Usunąć "${acc.name}" wraz z całą jego historią wpisów? Tej operacji nie można cofnąć.`
    : `Usunąć "${acc.name}"?`;
  if(!confirm(msg)) return;

  const toDelete = entries.filter(e => e.account === id);
  for(const e of toDelete) await dbDelete(STORE, e.id);
  entries = entries.filter(e => e.account !== id);

  await dbDelete(ACC_STORE, id);
  accounts = accounts.filter(a => a.id !== id);

  if(activeAccountId === id){
    activeAccountId = accounts[0].id;
  }
  renderAll();
  showToast('Konto usunięte');
}

async function addAccount(){
  accCounter += 1;
  const acc = { id: 'acc' + accCounter, name: 'Konto ' + accCounter };
  await dbPut(ACC_STORE, acc);
  accounts.push(acc);
  activeAccountId = acc.id;
  renderAll();
  showToast('Dodano nowe konto');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStats(){
  const wrap = document.getElementById('statRow');
  wrap.innerHTML = '';
  const totalAll = accounts.reduce((sum, a) => {
    const v = latestValue(a.id);
    return sum + (v || 0);
  }, 0);
  const accountsWithData = accounts.filter(a => latestValue(a.id) !== null).length;
  let todaySum = 0, hasToday = false;
  accounts.forEach(a => {
    const list = entriesForAccount(a.id);
    const wd = dailyDeltas(list);
    const t = wd.find(e => e.date === todayStr());
    if(t && t.delta !== null){ todaySum += t.delta; hasToday = true; }
  });
  const best = accounts.map(a => ({ a, v: latestValue(a.id) })).filter(x => x.v !== null).sort((x,y) => y.v - x.v)[0];
  wrap.appendChild(statCard('Suma wszystkich kont', formatShort(totalAll), null));
  wrap.appendChild(statCard('Konta z danymi', accountsWithData + ' / ' + accounts.length, null));
  wrap.appendChild(statCard('Łączny zarobek dziś', hasToday ? formatShort(todaySum) : '—', hasToday ? todaySum : null));
  wrap.appendChild(statCard('Najwyższe konto', best ? best.a.name : '—', null));
}

function statCard(label, value, deltaForColor){
  const div = document.createElement('div');
  div.className = 'stat';
  let cls = '';
  if(deltaForColor !== null && deltaForColor !== undefined){
    cls = deltaForColor > 0 ? 'pos' : deltaForColor < 0 ? 'neg' : '';
  }
  div.innerHTML = `<div class="lbl">${label}</div><div class="val ${cls}">${value}</div>`;
  return div;
}

function rangeStartDate(){
  if(chartRange === 'all') return null;
  const d = new Date();
  if(chartRange === 'week') d.setDate(d.getDate() - 7);
  else if(chartRange === 'month') d.setMonth(d.getMonth() - 1);
  else if(chartRange === 'year') d.setFullYear(d.getFullYear() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function filterByRange(list){
  const start = rangeStartDate();
  if(!start) return list;
  return list.filter(e => e.date >= start);
}

const CHART_PALETTE = ['#7ee787','#85B7EB','#F0997B','#ED93B1','#FAC775','#9FE1CB','#AFA9EC','#B4B2A9','#F7C1C1','#97C459'];

function renderChart(){
  const ctx = document.getElementById('mainChart');
  const emptyState = document.getElementById('emptyState');

  const rangeStart = rangeStartDate();
  const allDates = new Set();
  accounts.forEach(a => entriesForAccount(a.id).forEach(e => {
    if(!rangeStart || e.date >= rangeStart) allDates.add(e.date);
  }));
  const labels = Array.from(allDates).sort();
  const hasData = labels.length > 0;
  const datasets = accounts.map((a, idx) => {
    const wd = dailyDeltas(entriesForAccount(a.id));
    const byDate = {};
    wd.forEach(e => byDate[e.date] = e.balance);
    const data = labels.map(d => byDate.hasOwnProperty(d) ? byDate[d] : null);
    return {
      label: a.name,
      data,
      borderColor: CHART_PALETTE[idx % CHART_PALETTE.length],
      backgroundColor: CHART_PALETTE[idx % CHART_PALETTE.length] + '20',
      pointRadius: 2,
      pointHoverRadius: 4,
      borderWidth: 1.75,
      tension: 0.25,
      fill: false,
      spanGaps: true
    };
  }).filter(ds => ds.data.some(v => v !== null));
  document.getElementById('chartTitle').textContent = 'Stan wszystkich kont';
  renderChartLegend(datasets);

  emptyState.style.display = hasData ? 'none' : 'block';
  ctx.style.display = hasData ? 'block' : 'none';
  if(!hasData){
    if(chart){ chart.destroy(); chart = null; }
    return;
  }

  const isLight = document.documentElement.classList.contains('light');
  const gridColor = isLight ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.06)';
  const tickColor = isLight ? '#4a5568' : '#8b96a5';
  const titleColor = isLight ? '#1a1f2e' : '#e8ecf1';
  const bodyColor = isLight ? '#1a1f2e' : '#e8ecf1';

  const config = {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--panel-2').trim() || '#1b212b',
          borderColor: getComputedStyle(document.documentElement).getPropertyValue('--border-2').trim() || '#34404f',
          borderWidth: 1,
          titleColor: titleColor,
          bodyColor: bodyColor,
          padding: 10,
          callbacks: {
            label: (c) => {
              const v = c.parsed.y;
              return ' ' + c.dataset.label + ': ' + (v === null ? '—' : formatFull(v));
            }
          }
        }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: tickColor, maxRotation: 45, font: { size: 10.5 } } },
        y: {
          grid: { color: gridColor },
          ticks: { color: tickColor, font: { size: 10.5 }, callback: (v) => formatShort(v) }
        }
      }
    }
  };

  if(chart){ chart.destroy(); }
  chart = new Chart(ctx, config);
}

function renderChartLegend(datasets){
  const wrap = document.getElementById('chartLegend');
  if(!datasets.length){ wrap.innerHTML = ''; return; }
  wrap.innerHTML = datasets.map(ds => {
    const lastVal = [...ds.data].reverse().find(v => v !== null && v !== undefined);
    return `<span style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-dim);">
      <span style="width:9px;height:9px;border-radius:2px;background:${ds.borderColor};flex-shrink:0;"></span>${escapeHtml(ds.label)}<span style="color:var(--text-faint);">${lastVal !== undefined ? formatShort(lastVal) : ''}</span>
    </span>`;
  }).join('');
}

function renderHistory(){
  const wrap = document.getElementById('historyTable');
  const titleEl = document.getElementById('historyTitle');

  const accIdx = {};
  accounts.forEach((a, i) => accIdx[a.id] = i);

  const deltaByAccDate = {};
  accounts.forEach(a => {
    dailyDeltas(entriesForAccount(a.id)).forEach(e => {
      deltaByAccDate[a.id + '|' + e.date] = e.delta;
    });
  });

  const today = todayStr();
  let filterFn;
  if(historyFilter === 'today'){
    titleEl.textContent = 'Wpisy z dziś';
    filterFn = e => e.date === today;
  } else if(historyFilter === 'week'){
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    const weekStart = weekAgo.getFullYear() + '-' + String(weekAgo.getMonth()+1).padStart(2,'0') + '-' + String(weekAgo.getDate()).padStart(2,'0');
    titleEl.textContent = 'Wpisy z ostatnich 7 dni';
    filterFn = e => e.date >= weekStart;
  } else {
    titleEl.textContent = 'Wszystkie wpisy';
    filterFn = () => true;
  }

  const allEntries = entries.filter(filterFn).sort((a, b) => {
    if(a.date !== b.date) return b.date.localeCompare(a.date);
    return (accIdx[a.account] ?? 0) - (accIdx[b.account] ?? 0);
  });

  if(!entries.length){
    wrap.innerHTML = '<div class="empty-state" style="padding:24px 0;">Brak wpisów na żadnym koncie</div>';
    return;
  }
  if(!allEntries.length){
    const label = historyFilter === 'today' ? 'dziś' : historyFilter === 'week' ? 'w tym tygodniu' : '';
    wrap.innerHTML = `<div class="empty-state" style="padding:24px 0;">Brak wpisów ${label} — <button onclick="document.querySelector('#historyFilter [data-filter=all]').click()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:0;">pokaż wszystkie</button></div>`;
    return;
  }

  let rows = '';
  allEntries.forEach(e => {
    const acc = accounts.find(a => a.id === e.account);
    const accName = acc ? acc.name : e.account;
    const color = CHART_PALETTE[(accIdx[e.account] ?? 0) % CHART_PALETTE.length];
    const d = deltaByAccDate[e.account + '|' + e.date];
    const dCls = d === null || d === undefined ? '' : d > 0 ? 'pos' : d < 0 ? 'neg' : '';
    const dStr = d === null || d === undefined ? '—' : (d > 0 ? '+' : '') + formatShort(d);
    const balanceByAccDate = {};
    dailyDeltas(entriesForAccount(e.account)).forEach(x => balanceByAccDate[x.date] = x.balance);
    const displayBalance = balanceByAccDate[e.date] ?? e.value;
    const resetBadge = e.isReset ? ' <span title="Wpis po resecie farmy" style="font-size:11px;opacity:.8;">🧹</span>' : '';
    rows += `<tr${e.isReset ? ' style="background:rgba(255,180,84,0.05);"' : ''}>
      <td><span class="acc-badge"><span class="dot" style="background:${color}"></span>${escapeHtml(accName)}</span></td>
      <td>${e.date}${resetBadge}</td>
      <td class="editable-value" data-id="${e.id}" data-raw="${e.value}" title="Kliknij, aby edytować">${formatFull(displayBalance)}</td>
      <td class="delta ${dCls}">${dStr}</td>
      <td class="del-cell"><button data-id="${e.id}" title="Usuń wpis">&times;</button></td>
    </tr>`;
  });
  wrap.innerHTML = `<table>
    <thead><tr><th>Konto</th><th>Data</th><th>Stan konta</th><th>Zmiana</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  wrap.querySelectorAll('button[data-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await dbDelete(STORE, btn.dataset.id);
      entries = entries.filter(e => e.id !== btn.dataset.id);
      renderAll();
      showToast('Wpis usunięty');
    });
  });
  wrap.querySelectorAll('td.editable-value').forEach(cell => {
    cell.addEventListener('click', () => startEditCell(cell));
  });
}

function valueToEditableShorthand(n){
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if(abs >= 1_000_000_000_000_000) return sign + (abs/1_000_000_000_000_000).toFixed(3).replace(/0+$/,'').replace(/\.$/,'') + 'q';
  if(abs >= 1_000_000_000_000) return sign + (abs/1_000_000_000_000).toFixed(3).replace(/0+$/,'').replace(/\.$/,'') + 't';
  if(abs >= 1_000_000_000) return sign + (abs/1_000_000_000).toFixed(3).replace(/0+$/,'').replace(/\.$/,'') + 'k';
  return sign + (abs/1_000_000).toFixed(3).replace(/0+$/,'').replace(/\.$/,'');
}

function startEditCell(cell){
  const id = cell.dataset.id;
  const entry = entries.find(e => e.id === id);
  if(!entry) return;
  const currentShort = valueToEditableShorthand(entry.value);
  cell.innerHTML = `<input type="text" inputmode="decimal" value="${currentShort}" autocomplete="off">`;
  const input = cell.querySelector('input');
  input.focus();
  input.select();

  let done = false;
  async function commit(){
    if(done) return;
    done = true;
    const newVal = parseShorthand(input.value);
    if(newVal === null){
      showToast('Nieprawidłowa wartość, zmiana odrzucona');
      renderHistory();
      return;
    }
    entry.value = newVal;
    await dbPut(STORE, entry);
    renderAll();
    showToast('Wpis zaktualizowany ✓');
  }
  function cancel(){
    if(done) return;
    done = true;
    renderHistory();
  }

  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); commit(); }
    if(e.key === 'Escape'){ e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', () => commit());
}

function renderSubline(){
  const sub = document.getElementById('subLine');
  const total = entries.length;
  sub.textContent = total + ' wpisów łącznie na ' + accounts.length + ' kontach';
}

function renderAll(){
  renderAccountList();
  renderStats();
  renderChart();
  renderHistory();
  renderSubline();
}

async function saveEntry(){
  const input = document.getElementById('valueInput');
  const status = document.getElementById('entryStatus');
  const resetCheck = document.getElementById('resetCheck');
  const raw = input.value;
  const value = parseShorthand(raw);
  if(value === null){
    status.style.color = 'var(--danger)';
    status.textContent = 'Nieprawidłowa wartość. Spróbuj np. 10.5 albo 2.3k';
    return;
  }
  const isReset = resetCheck.checked;
  const date = todayStr();
  const id = activeAccountId + '_' + date;
  const existing = entries.find(e => e.id === id);
  const entry = { id, account: activeAccountId, date, value, isReset, savedAt: Date.now() };
  await dbPut(STORE, entry);
  if(existing){
    Object.assign(existing, entry);
  } else {
    entries.push(entry);
  }
  input.value = '';
  resetCheck.checked = false;
  document.getElementById('resetCheckLabel').classList.remove('active');
  status.style.color = 'var(--accent)';
  const resetNote = isReset ? ' 🧹 reset' : '';
  status.textContent = (existing ? 'Zaktualizowano ✓' : 'Zapisano ✓') + resetNote + '  (' + formatFull(value) + ')';
  renderAll();
  setTimeout(() => { status.textContent = ''; }, 2500);
}

function applyTheme(light){
  document.documentElement.classList.toggle('light', light);
  document.getElementById('themeIcon').textContent = light ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = light ? 'Ciemny motyw' : 'Jasny motyw';
  if(chart) renderChart();
}

function initTheme(){
  const saved = localStorage.getItem('ps99_theme');
  const isLight = saved === 'light';
  applyTheme(isLight);
}

function setupEvents(){
  document.getElementById('themeBtn').addEventListener('click', () => {
    const isLight = !document.documentElement.classList.contains('light');
    localStorage.setItem('ps99_theme', isLight ? 'light' : 'dark');
    applyTheme(isLight);
  });

  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('valueInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') saveEntry();
  });

  document.getElementById('addAccountBtn').addEventListener('click', addAccount);

  document.getElementById('resetCheck').addEventListener('change', (e) => {
    document.getElementById('resetCheckLabel').classList.toggle('active', e.target.checked);
  });

  document.querySelectorAll('#historyFilter button').forEach(btn => {
    btn.addEventListener('click', () => {
      historyFilter = btn.dataset.filter;
      document.querySelectorAll('#historyFilter button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderHistory();
    });
  });

  document.querySelectorAll('#rangeToggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      chartRange = btn.dataset.range;
      document.querySelectorAll('#rangeToggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChart();
    });
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const exportData = { accounts, entries };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ps99_farm_export_' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Eksport pobrany');
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    if(!confirm('Na pewno usunąć wszystkie zapisane dane ze wszystkich kont? Tej operacji nie można cofnąć.')) return;
    await dbClear(STORE);
    await dbClear(ACC_STORE);
    entries = [];
    accounts = defaultAccounts();
    for(const a of accounts) await dbPut(ACC_STORE, a);
    activeAccountId = accounts[0].id;
    renderAll();
    showToast('Wszystkie dane wyczyszczone');
  });
}

async function init(){
  initTheme();
  db = await openDB();
  entries = await dbGetAll(STORE);
  accounts = await dbGetAll(ACC_STORE);
  if(!accounts.length){
    accounts = defaultAccounts();
    for(const a of accounts) await dbPut(ACC_STORE, a);
  }
  accCounter = accounts.reduce((max, a) => {
    const n = parseInt(String(a.id).replace('acc',''), 10);
    return isNaN(n) ? max : Math.max(max, n);
  }, 0);
  activeAccountId = accounts[0].id;
  setupEvents();
  renderAll();
}

init().catch(err => {
  console.error(err);
  document.querySelector('.main').innerHTML = '<div class="empty-state"><i class="ti ti-alert-triangle"></i>Nie udało się otworzyć bazy danych przeglądarki (IndexedDB). Spróbuj w innej przeglądarce lub trybie nie-prywatnym.</div>';
});

})();
</script>
